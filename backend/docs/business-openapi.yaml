              example:
                success: false
                message: sourceSystem 必须是 CITI 或 BOC
                timestamp: "2026-01-24T20:00:00.123Z"
        "422":
          description: 验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        "403":
          description: 签名验证失败或API密钥无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "408":
          description: 请求时间戳过期（超过5分钟）或无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    # 组织同步请求
    OrganizationSyncRequest:
      type: object
      required:
        - sourceSystem
        - syncType
        - organizations
        - api_key
        - timestamp
        - sign
      properties:
        sourceSystem:
          type: string
          enum:
            - CITI
            - BOC
          description: "来源系统：CITI=招行，BOC=中行"
        syncType:
          type: string
          enum:
            - FULL
            - ADD
            - UPDATE
            - DELETE
          description: "同步类型：FULL=全量，ADD=新增，UPDATE=更新，DELETE=删除"
        organizations:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Organization'
          description: 组织树形数据
        api_key:
          type: string
          description: API密钥标识（平台分配）
        timestamp:
          type: integer
          description: 毫秒级时间戳
        sign:
          type: string
          description: HMAC-SHA256签名（十六进制）

    # 组织对象
    Organization:
      type: object
      required:
        - orgCode
        - orgName
        - orgType
      properties:
        orgCode:
          type: string
          maxLength: 100
          description: 组织代码（唯一标识）
        orgName:
          type: string
          maxLength: 200
          description: 组织名称
        orgType:
          type: string
          enum:
            - DEPARTMENT
            - MERCHANT
            - OUTLET
          description: "组织类型：DEPARTMENT=部门，MERCHANT=商户，OUTLET=门店"
        contactPerson:
          type: string
          maxLength: 100
          nullable: true
          description: 联系人（可选）
        contactPhone:
          type: string
          maxLength: 20
          nullable: true
          description: 联系电话（可选）
        children:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
          nullable: true
          description: 子组织（仅DEPARTMENT可有，可选）
        outlets:
          type: array
          items:
            $ref: '#/components/schemas/Outlet'
          nullable: true
          description: 门店列表（MERCHANT或DEPARTMENT的子级，可选）
        address:
          type: string
          maxLength: 500
          nullable: true
          description: 地址（可选）
        businessHours:
          type: string
          maxLength: 100
          nullable: true
          description: 营业时间（可选）
        capacity:
          type: integer
          nullable: true
          description: 容纳人数（可选）
        facilities:
          type: array
          items:
            type: string
          nullable: true
          description: 设施列表（可选）
        paymentMethods:
          type: array
          items:
            type: string
          nullable: true
          description: 支付方式（可选）

    # 门店对象
    Outlet:
      type: object
      required:
        - outletId
        - outletName
        - canteenCode
        - canteenType
      properties:
        outletId:
          type: string
          maxLength: 100
          description: 门店ID（唯一标识）
        outletName:
          type: string
          maxLength: 200
          description: 门店名称
        canteenCode:
          type: string
          maxLength: 50
          description: 食堂编码（唯一标识，作为 ha_ykt_canteens 表的 canteen_code）
        canteenType:
          type: string
          enum:
            - "1"
            - "2"
            - "3"
          description: "食堂类型（必填）：1=机关，2=企业，3=学校"
        canteenLevel:
          type: string
          enum:
            - A
            - B
            - C
          nullable: true
          description: "食堂等级（可选）：A=优秀，B=良好，C=合格"
        address:
          type: string
          maxLength: 500
          nullable: true
          description: 地址（可选）
        longitude:
          type: string
          maxLength: 50
          nullable: true
          description: 经度（可选）
        latitude:
          type: string
          maxLength: 50
          nullable: true
          description: 纬度（可选）
        contactPerson:
          type: string
          maxLength: 100
          nullable: true
          description: 联系人（可选）
        contactPhone:
          type: string
          maxLength: 20
          nullable: true
          description: 联系电话（可选）
        businessHours:
          type: string
          maxLength: 100
          nullable: true
          description: 营业时间（如：07:00-20:00，可选）
        capacity:
          type: integer
          nullable: true
          description: 容纳人数（人，可选）
        facilities:
          type: array
          items:
            type: string
          nullable: true
          description: "设施列表（可选），例如：['空调', 'WiFi', '停车场']"
        paymentMethods:
          type: array
          items:
            type: string
          nullable: true
          description: "支付方式（可选），例如：['CARD', 'QRCODE']"
        canteenStatus:
          type: string
          enum:
            - "1"
            - "2"
            - "3"
          nullable: true
          description: "食堂状态（可选）：1=正常营业，2=暂停营业，3=已下线"

    # 组织同步成功响应
    OrganizationSyncSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
          description: 响应成功标志
        message:
          type: string
          example: 组织同步成功
          description: 响应消息
        data:
          type: object
          properties:
            syncStatus:
              type: string
              enum:
                - SUCCESS
              description: 同步状态
            organizations:
              type: array
              items:
                $ref: '#/components/schemas/OrganizationResult'
              description: 树形结构的组织数据（保持层级关系）
            summary:
              type: object
              properties:
                rootOrgsCreated:
                  type: integer
                  description: 创建的根组织数量
                childOrgsCreated:
                  type: integer
                  description: 创建的子组织数量
                canteensCreated:
                  type: integer
                  description: 创建的门店数量
              description: 统计信息
        timestamp:
          type: string
          format: date-time
          description: 响应时间戳

    # 组织结果对象（返回结构）
    OrganizationResult:
      type: object
      properties:
        orgCode:
          type: string
          description: 组织代码
        orgName:
          type: string
          description: 组织名称
        orgType:
          type: string
          enum:
            - DEPARTMENT
            - MERCHANT
          description: 组织类型
        platformOrgId:
          type: string
          format: uuid
          description: 平台分配的组织ID
        children:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationResult'
          description: 子组织列表（递归结构）
        outlets:
          type: array
          items:
            $ref: '#/components/schemas/OutletResult'
          description: 门店列表

    # 门店结果对象（返回结构）
    OutletResult:
      type: object
      properties:
        outletId:
          type: string
          description: 门店ID
        outletName:
          type: string
          description: 门店名称
        canteenCode:
          type: string
          description: 食堂编码
        platformCanteenId:
          type: string
          format: uuid
          description: 平台分配的门店ID

    # 用户同步请求
    UserSyncRequest:
      type: object
      required:
        - canteenCode
        - userId
        - userName
        - isStaff
        - userStatus
        - userBindingOrgId
        - syncType
        - syncTime
        - api_key
        - timestamp
        - sign
      properties:
        canteenCode:
          type: string
          maxLength: 50
          description: 食堂编码
        userId:
          type: string
          maxLength: 100
          description: 用户ID（食堂系统内的唯一标识）
        userName:
          type: string
          maxLength: 100
          description: 用户姓名
        userMobile:
          type: string
          maxLength: 20
          nullable: true
          description: 手机号（可选）
        isStaff:
          type: string
          enum:
            - "Y"
            - "N"
          description: "是否职工：Y=是，N=否"
        userOtherId:
          type: string
          maxLength: 100
          nullable: true
          description: 职工编号（可选）
        userStatus:
          type: string
          enum:
            - "1"
            - "2"
            - "3"
          description: "用户状态：1=正常，2=冻结，3=注销"
        userBindingOrgId:
          type: string
          format: uuid
          description: |
            用户绑定的组织ID（必填）
            - 来自组织同步接口返回的 organizations[0].platformOrgId（根组织ID）
            - 用于绑定用户到对应的部门（招行）或商户（中行）
            - 调用方必须从组织同步接口获取此值后再调用用户同步接口
        entityCards:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/EntityCard'
          description: 实体卡列表（可选，一对多关系）。如果用户没有实体卡，可以传空数组或不传此字段
        syncType:
          type: string
          enum:
            - FULL
            - UPDATE
          description: "同步类型：FULL=全量同步，UPDATE=更新"
        syncTime:
          type: string
          format: date-time
          description: 同步时间（ISO 8601格式）
        api_key:
          type: string
          description: API密钥标识（平台分配）
        timestamp:
          type: integer
          description: 毫秒级时间戳
        sign:
          type: string
          description: HMAC-SHA256签名（十六进制）

    # 实体卡
    EntityCard:
      type: object
      required:
        - entityCardNo
        - entityCardType
        - status
      properties:
        entityCardNo:
          type: string
          maxLength: 50
          description: 卡号
        entityCardType:
          type: string
          enum:
            - "1"
            - "2"
            - "3"
          description: "卡类型：1=普通，2=临时，3=VIP"
        status:
          type: string
          enum:
            - "Y"
            - "N"
          description: "挂失状态：Y=挂失，N=正常"
        dayConsumeCeiling:
          type: number
          format: double
          nullable: true
          description: 日消费限额（可选）
        cardBalance:
          type: number
          format: double
          nullable: true
          description: 卡余额（可选）
        cardIssueDate:
          type: string
          format: date
          nullable: true
          description: 发卡日期（YYYY-MM-DD，可选）
        cardExpireDate:
          type: string
          format: date
          nullable: true
          description: 卡有效期（YYYY-MM-DD，可选）
        lossReportTime:
          type: string
          format: date-time
          nullable: true
          description: 挂失时间（可选）

    # 用户同步成功响应
    UserSyncSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
          description: 响应成功标志
        message:
          type: string
          example: 用户同步成功
          description: 响应消息
        data:
          type: object
          properties:
            platformUserId:
              type: string
              description: 平台分配的用户ID
            platformCardIds:
              type: array
              items:
                type: string
              description: 平台分配的卡片ID列表（与entityCards对应）
            syncStatus:
              type: string
              enum:
                - SUCCESS
              description: 同步状态
        timestamp:
          type: string
          format: date-time
          description: 响应时间戳

    # 消费流水同步请求
    ConsumptionTransactionSyncRequest:
      type: object
      required:
        - sourceSystem
        - transactions
        - syncTime
        - api_key
        - timestamp
        - sign
      properties:
        sourceSystem:
          type: string
          enum:
            - CITI
            - BOC
          description: "来源系统：CITI=招行，BOC=中行"
        transactions:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/ConsumptionTransaction'
          description: 消费流水数组（1-100条）
        syncTime:
          type: string
          format: date-time
          description: 同步时间（ISO 8601格式）
        api_key:
          type: string
          description: API密钥标识（平台分配）
        timestamp:
          type: integer
          description: 毫秒级时间戳
        sign:
          type: string
          description: HMAC-SHA256签名（十六进制）

    # 消费流水对象
    ConsumptionTransaction:
      type: object
      required:
        - sourceTransactionId
        - platformCanteenId
        - platformUserId
        - platformCardId
        - transactionType
        - transactionAmount
        - transactionTime
      properties:
        sourceTransactionId:
          type: string
          maxLength: 100
          description: 来源系统的流水ID（唯一标识）
        platformCanteenId:
          type: string
          format: uuid
          description: 平台门店ID（来自组织同步接口返回）
        platformUserId:
          type: string
          format: uuid
          description: 平台用户ID（来自用户同步接口返回）
        platformCardId:
          type: string
          format: uuid
          description: 平台卡ID（来自用户同步接口返回）
        transactionType:
          type: string
          enum:
            - CONSUME
            - REFUND
            - RECHARGE
          description: "交易类型：CONSUME=消费，REFUND=退款，RECHARGE=充值"
        transactionAmount:
          type: number
          format: double
          description: 交易金额
        balanceBefore:
          type: number
          format: double
          nullable: true
          description: 交易前余额（可选）
        balanceAfter:
          type: number
          format: double
          nullable: true
          description: 交易后余额（可选）
        transactionTime:
          type: string
          format: date-time
          description: 交易时间（ISO 8601格式）
        merchantName:
          type: string
          maxLength: 200
          nullable: true
          description: 商户名称（可选）
        terminalId:
          type: string
          maxLength: 50
          nullable: true
          description: 终端ID（可选）
        posId:
          type: string
          maxLength: 50
          nullable: true
          description: POS机ID（可选）
        mealType:
          type: string
          enum:
            - BREAKFAST
            - LUNCH
            - DINNER
            - SNACK
          nullable: true
          description: "餐别（可选）：BREAKFAST=早餐，LUNCH=午餐，DINNER=晚餐，SNACK=小吃"
        dishItems:
          type: array
          items:
            $ref: '#/components/schemas/DishItem'
          nullable: true
          description: 菜品明细（可选）
        discountAmount:
          type: number
          format: double
          nullable: true
          description: 优惠金额（可选，默认0.00）
        subsidyAmount:
          type: number
          format: double
          nullable: true
          description: 补贴金额（可选，默认0.00）
        status:
          type: string
          enum:
            - SUCCESS
            - FAILED
            - REFUNDED
          nullable: true
          description: "状态（可选，默认SUCCESS）：SUCCESS=成功，FAILED=失败，REFUNDED=已退款"
        remark:
          type: string
          maxLength: 500
          nullable: true
          description: 备注（可选）

    # 菜品明细对象
    DishItem:
      type: object
      required:
        - dishName
        - quantity
        - unitPrice
        - amount
      properties:
        dishName:
          type: string
          maxLength: 200
          description: 菜品名称
        quantity:
          type: integer
          description: 数量
        unitPrice:
          type: number
          format: double
          description: 单价
        amount:
          type: number
          format: double
          description: 小计金额

    # 消费流水同步成功响应
    ConsumptionTransactionSyncSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
          description: 响应成功标志
        message:
          type: string
          example: 消费流水同步成功
          description: 响应消息
        data:
          type: object
          properties:
            syncStatus:
              type: string
              enum:
                - SUCCESS
                - PARTIAL_SUCCESS
                - FAILED
              description: "同步状态：SUCCESS=全部成功，PARTIAL_SUCCESS=部分成功，FAILED=全部失败"
            totalCount:
              type: integer
              description: 总流水数
            successCount:
              type: integer
              description: 成功数
            failedCount:
              type: integer
              description: 失败数
            duplicateCount:
              type: integer
              description: 重复数（幂等性）
            results:
              type: array
              items:
                $ref: '#/components/schemas/TransactionResult'
              description: 每条流水的处理结果
        timestamp:
          type: string
          format: date-time
          description: 响应时间戳

    # 流水处理结果对象
    TransactionResult:
      type: object
      properties:
        sourceTransactionId:
          type: string
          description: 来源系统的流水ID
        platformTransactionId:
          type: string
          format: uuid
          nullable: true
          description: 平台分配的流水ID（成功或重复时返回）
        status:
          type: string
          enum:
            - SUCCESS
            - DUPLICATE
            - FAILED
          description: "处理状态：SUCCESS=成功，DUPLICATE=重复，FAILED=失败"
        message:
          type: string
          description: 处理消息

    # 错误响应
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
          description: 响应成功标志
        message:
          type: string
          description: 错误消息
        timestamp:
          type: string
          format: date-time
          description: 响应时间戳

    # 验证错误响应
    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
          description: 响应成功标志
        message:
          type: string
          description: 错误消息
        errors:
          type: array
          items:
            type: object
            properties:
              context:
                type: object
                properties:
                  key:
                    type: string
                    description: 出错字段名
              message:
                type: string
                description: 字段错误信息
          description: 详细的验证错误列表
        timestamp:
          type: string
          format: date-time
          description: 响应时间戳

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api_key
      description: API密钥标识

    SignatureAuth:
      type: http
      scheme: bearer
      bearerFormat: HMAC-SHA256
      description: HMAC-SHA256签名验证

security:
  - ApiKeyAuth: []
  - SignatureAuth: []
