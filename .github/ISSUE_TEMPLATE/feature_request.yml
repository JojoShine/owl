name: Feature Request
description: 提出新功能建议
title: "[Feature] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢提出功能建议！请清晰地描述你的需求和使用场景。

  - type: textarea
    id: problem
    attributes:
      label: 问题或需求
      description: 描述你遇到的问题或需求
      placeholder: 当前系统没有...，这在...场景下很有用
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 描述你的建议方案
      placeholder: 可以通过...来实现...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否有其他可能的方案？
      placeholder: 也可以考虑...

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 这个功能的具体使用场景
      placeholder: 这对于...场景很重要
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已搜索现有的 Issue 和讨论
          required: true
        - label: 这个功能与项目定位相符
          required: true
