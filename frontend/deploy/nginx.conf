# Nginx 配置文件 - owl 管理系统
# 部署位置: /etc/nginx/conf.d/rx_survey_owl.conf

server {
    listen 80;
    server_name localhost;

    # 日志配置
    access_log /var/log/nginx/rx_survey_owl_access.log;
    error_log /var/log/nginx/rx_survey_owl_error.log;

    # 客户端请求体大小限制（用于文件上传）
    client_max_body_size 20M;

    # ==========================================
    # Socket.io WebSocket 代理（必须放在其他规则之前！）
    # 仅允许白名单 IP 访问
    # ==========================================
    location /owl/socket.io/ {
        # IP 白名单
        allow 2.88.0.0/16;      # 允许 2.88.0.0 - 2.88.255.255
        allow 20.88.0.0/16;     # 允许 20.88.0.0 - 20.88.255.255
        deny all;               # 拒绝其他所有IP

        # 代理到后端 Socket.io 服务
        # /owl/socket.io/ -> http://backend/socket.io/
        proxy_pass http://localhost:3001/socket.io/;

        # WebSocket 必需的头
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 基本代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置（WebSocket 长连接）
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;  # 1小时
        proxy_read_timeout 3600s;   # 1小时

        # 禁用缓冲
        proxy_buffering off;
    }

    # ==========================================
    # 公开 API 代理（必须放在 /owl/api 之前！）
    # 用于第三方系统数据同步，允许外部访问
    # ==========================================
    location /owl/api/public {
        # 代理到后端服务
        # /owl/api/public/xxx -> http://localhost:3001/api/public/xxx
        proxy_pass http://localhost:3001/api/public;

        # 基本代理头
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 禁用缓冲
        proxy_buffering off;

        # IP 白名单（可选，根据实际情况配置）
        # allow 192.168.1.0/24;  # 允许内网访问
        # allow 1.2.3.4;         # 允许特定IP访问
        # deny all;              # 拒绝其他所有IP
    }

    # ==========================================
    # 静态文件代理（上传的图片等）
    # 仅允许白名单 IP 访问
    # ==========================================
    location /owl/uploads/ {
        # IP 白名单
        allow 2.88.0.0/16;      # 允许 2.88.0.0 - 2.88.255.255
        allow 20.88.0.0/16;     # 允许 20.88.0.0 - 20.88.255.255
        deny all;               # 拒绝其他所有IP

        # 代理到后端服务
        # /owl/uploads/xxx.png -> http://localhost:3001/uploads/xxx.png
        proxy_pass http://localhost:3001/uploads/;

        # 基本代理头
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 静态文件缓存
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ==========================================
    # 后端 API 代理
    # 仅允许白名单 IP 访问
    # ==========================================
    location /owl/api {
        # IP 白名单
        allow 2.88.0.0/16;      # 允许 2.88.0.0 - 2.88.255.255
        allow 20.88.0.0/16;     # 允许 20.88.0.0 - 20.88.255.255
        deny all;               # 拒绝其他所有IP

        # 代理到后端服务
        # /owl/api/xxx -> http://localhost:3001/api/xxx
        proxy_pass http://localhost:3001/api;

        # 基本代理头
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection 头处理：根据请求类型动态设置
        # 如果是 WebSocket 升级请求，设置为 "upgrade"
        # 否则设置为 "" (空字符串，让 Nginx 使用默认的 keep-alive)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 禁用缓冲（适合流式响应）
        proxy_buffering off;
    }

    # 前端 public 资源（logo 等）
    # 仅允许白名单 IP 访问
    location /owl/static/ {
        # IP 白名单
        allow 2.88.0.0/16;      # 允许 2.88.0.0 - 2.88.255.255
        allow 20.88.0.0/16;     # 允许 20.88.0.0 - 20.88.255.255
        deny all;               # 拒绝其他所有IP

        alias /opt/frontend/owl-frontend/public/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000";
    }

    # ==========================================
    # 前端应用（Next.js 服务器）
    # 仅允许白名单 IP 访问
    # ==========================================
    location /owl {
        # IP 白名单
        allow 2.88.0.0/16;      # 允许 2.88.0.0 - 2.88.255.255
        allow 20.88.0.0/16;     # 允许 20.88.0.0 - 20.88.255.255
        deny all;               # 拒绝其他所有IP

        # 代理到 Next.js 服务
        proxy_pass http://localhost:3000;

        # 基本代理头
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 禁用缓存（对于 Next.js SSR）
        proxy_cache_bypass $http_upgrade;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==========================================
    # 根路径重定向（可选）
    # ==========================================
    location = / {
        return 301 /owl;
    }

    # ==========================================
    # Gzip 压缩
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
}
